<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus  | Admin Suite</title>
    <style>
        :root {
            --apple-blue: #0071e3;
            --apple-green: #30d158;
            --apple-red: #ff3b30;
            --glass-bg: rgba(28, 28, 30, 0.85);
            --border-color: rgba(255, 255, 255, 0.15);
        }

        body { 
            margin: 0; background: #000; color: #fff; 
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            overflow: hidden; height: 100vh;
            background: url('https://www.apple.com/v/home/bl/images/overview/hero/hero_iphone15pro__de9bc4v8h26u_large.jpg') no-repeat center center fixed;
            background-size: cover;
        }

        /* Fixed Navigation */
        .app-header {
            position: fixed; top: 0; left: 0; width: 100%; height: 50px;
            background: rgba(0,0,0,0.8); backdrop-filter: blur(20px);
            border-bottom: 1px solid #333; display: flex; align-items: center;
            justify-content: space-between; padding: 0 30px; box-sizing: border-box; z-index: 9999;
        }

        .nav-tabs { display: flex; gap: 8px; }
        .nav-tab {
            background: none; border: none; color: #86868b; font-size: 13px;
            cursor: pointer; padding: 6px 14px; border-radius: 8px; transition: 0.2s;
        }
        .nav-tab.active { background: rgba(255,255,255,0.15); color: #fff; font-weight: 600; }

        /* Clicking Fixes */
        .apple-container {
            display: flex; align-items: center; justify-content: center;
            height: 100vh; width: 100vw; position: absolute; top: 0; left: 0;
            pointer-events: none;
        }

        .glass-panel {
            background: var(--glass-bg); backdrop-filter: blur(40px) saturate(150%);
            border-radius: 28px; border: 1px solid var(--border-color);
            width: 90%; max-width: 600px; padding: 45px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.7); z-index: 100;
            pointer-events: auto; /* Buttons inside are clickable */
        }

        h1 { font-size: 32px; margin: 0 0 8px 0; letter-spacing: -0.8px; font-weight: 700; }
        .subtitle { color: #86868b; margin-bottom: 30px; font-size: 15px; }

        input, textarea {
            width: 100%; border-radius: 14px; border: 1px solid #424245;
            background: rgba(0,0,0,0.5); color: #fff; padding: 18px;
            margin-bottom: 15px; outline: none; font-size: 15px; box-sizing: border-box;
            transition: border 0.3s;
        }
        input:focus { border-color: var(--apple-blue); }

        .apple-btn {
            background: var(--apple-blue); color: #fff; border: none;
            border-radius: 14px; padding: 16px; font-size: 16px; font-weight: 600;
            cursor: pointer; width: 100%; transition: 0.3s; margin-top: 5px;
        }
        .apple-btn:active { transform: scale(0.98); }

        .tab-content { display: none; }
        .tab-content.active { display: block; animation: appleFade 0.4s ease-out; }

        @keyframes appleFade {
            from { opacity: 0; transform: scale(0.98); }
            to { opacity: 1; transform: scale(1); }
        }

        /* List Styling */
        .game-list { background: rgba(0,0,0,0.3); border-radius: 16px; border: 1px solid var(--border-color); max-height: 220px; overflow-y: auto; padding: 5px; }
        .game-item { padding: 12px 15px; border-bottom: 1px solid rgba(255,255,255,0.05); display: flex; justify-content: space-between; font-size: 14px; }
        .status-dot { width: 9px; height: 9px; background: var(--apple-green); border-radius: 50%; display: inline-block; margin-right: 10px; box-shadow: 0 0 10px var(--apple-green); }
    </style>
</head>
<body>

    <header class="app-header">
        <div style="font-weight:700; letter-spacing: -0.5px;"> Nexus</div>
        <nav class="nav-tabs">
            <button class="nav-tab active" onclick="showTab('executor')">Executor</button>
            <button class="nav-tab" onclick="showTab('whitelist')">Whitelist</button>
            <button class="nav-tab" onclick="showTab('games')">Games</button>
            <button class="nav-tab" onclick="showTab('admin')">Admin</button>
        </nav>
        <div id="clock" style="font-size:13px; color:#86868b; font-weight: 500;">00:00:00</div>
    </header>

    <div class="apple-container">
        <div class="glass-panel">
            
            <div id="executor" class="tab-content active">
                <h1>Executor</h1>
                <p class="subtitle">Broadcast Lua payloads to all active nodes.</p>
                <input type="password" id="pass_field" placeholder="System Password">
                <textarea id="lua_field" rows="6" placeholder="print(' Nexus Connected')"></textarea>
                <button class="apple-btn" onclick="sendPush()">Push Payload</button>
            </div>

            <div id="whitelist" class="tab-content">
                <h1>Whitelist</h1>
                <p class="subtitle">Authorize specific UserIDs for system access.</p>
                <input type="text" id="wl_user" placeholder="Enter Roblox UserID">
                <button class="apple-btn" onclick="updateWhitelist('add')">Authorize ID</button>
                <button class="apple-btn" style="background:#323232; margin-top:10px;" onclick="updateWhitelist('remove')">Revoke Access</button>
                <p id="wl_status" style="text-align:center; font-size:13px; color:var(--apple-green); margin-top:20px; font-weight:500;"></p>
            </div>

            <div id="games" class="tab-content">
                <h1>Active Games</h1>
                <p class="subtitle">Real-time status of connected servers.</p>
                <div id="game_list" class="game-list">
                    <div style="color:#555; text-align:center; padding: 20px;">Scanning for heartbeats...</div>
                </div>
            </div>

            <div id="admin" class="tab-content">
                <h1>Terminal</h1>
                <p class="subtitle">Server-side activity logs.</p>
                <div id="log_box" class="game-list" style="height:180px; font-family:'SF Mono', monospace; font-size:11px; color:#30d158; padding: 15px;">
                    > System Booting...
                </div>
            </div>

        </div>
    </div>

    <script>
        // Start Clock Immediately
        function startClock() {
            setInterval(() => {
                document.getElementById('clock').innerText = new Date().toLocaleTimeString();
            }, 1000);
        }

        // Tab Switching
        function showTab(id) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-tab').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            event.currentTarget.classList.add('active');
        }
