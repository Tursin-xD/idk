<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus  | Admin Suite</title>
    <style>
        :root { --apple-blue: #0071e3; --apple-green: #30d158; --glass-bg: rgba(28, 28, 30, 0.85); --border-color: rgba(255, 255, 255, 0.15); }
        body { margin: 0; background: #000 url('https://www.apple.com/v/home/bl/images/overview/hero/hero_iphone15pro__de9bc4v8h26u_large.jpg') no-repeat center center fixed; background-size: cover; color: #fff; font-family: -apple-system, sans-serif; overflow: hidden; height: 100vh; }
        .app-header { position: fixed; top: 0; left: 0; width: 100%; height: 50px; background: rgba(0,0,0,0.8); backdrop-filter: blur(20px); border-bottom: 1px solid #333; display: flex; align-items: center; justify-content: space-between; padding: 0 30px; box-sizing: border-box; z-index: 9999; }
        .nav-tabs { display: flex; gap: 10px; }
        .nav-tab { background: none; border: none; color: #86868b; cursor: pointer; padding: 6px 12px; border-radius: 6px; font-size: 13px; }
        .nav-tab.active { background: rgba(255,255,255,0.15); color: #fff; font-weight: 600; }
        .apple-container { display: flex; align-items: center; justify-content: center; height: 100vh; width: 100vw; position: absolute; top: 0; left: 0; pointer-events: none; }
        .glass-panel { background: var(--glass-bg); backdrop-filter: blur(30px); border-radius: 24px; border: 1px solid var(--border-color); width: 90%; max-width: 600px; padding: 40px; pointer-events: auto; z-index: 100; }
        h1 { font-size: 28px; margin: 0; }
        .subtitle { color: #86868b; margin-bottom: 20px; font-size: 14px; }
        input, textarea { width: 100%; border-radius: 12px; border: 1px solid #424245; background: rgba(0,0,0,0.4); color: #fff; padding: 15px; margin-bottom: 15px; outline: none; box-sizing: border-box; font-family: inherit; }
        .apple-btn { background: var(--apple-blue); color: #fff; border: none; border-radius: 12px; padding: 14px; font-weight: 600; cursor: pointer; width: 100%; margin-bottom: 10px; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .list-box { background: rgba(0,0,0,0.2); border-radius: 12px; border: 1px solid var(--border-color); height: 150px; overflow-y: auto; padding: 10px; font-size: 13px; }
    </style>
</head>
<body>
    <header class="app-header">
        <div style="font-weight:600;"> Nexus</div>
        <nav class="nav-tabs">
            <button class="nav-tab active" onclick="showTab('executor')">Executor</button>
            <button class="nav-tab" onclick="showTab('whitelist')">Whitelist</button>
            <button class="nav-tab" onclick="showTab('games')">Games</button>
        </nav>
        <div id="clock">00:00:00</div>
    </header>

    <div class="apple-container">
        <div class="glass-panel">
            <div id="executor" class="tab-content active">
                <h1>Executor</h1><p class="subtitle">Push vLua Payload</p>
                <input type="password" id="pass" placeholder="Password">
                <textarea id="lua" placeholder="print('Hello')"></textarea>
                <button class="apple-btn" onclick="sendPush()">Push</button>
            </div>
            <div id="whitelist" class="tab-content">
                <h1>Whitelist</h1><p class="subtitle">Old Style Management</p>
                <input type="text" id="wl_id" placeholder="UserID">
                <button class="apple-btn" onclick="doWl('add')">Authorize</button>
                <button class="apple-btn" style="background:#333" onclick="doWl('remove')">Revoke</button>
                <p id="wl_stat" style="color:var(--apple-green); text-align:center;"></p>
            </div>
            <div id="games" class="tab-content">
                <h1>Games</h1><p class="subtitle">Live Heartbeat</p>
                <div id="g_list" class="list-box"></div>
            </div>
        </div>
    </div>

    <script>
        function showTab(id) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-tab').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            event.currentTarget.classList.add('active');
        }
        function startClock() { setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString(); }, 1000); }
        async function sendPush() {
            const res = await fetch('/push-lua', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({lua:document.getElementById('lua').value, password:document.getElementById('pass').value})});
            alert(res.ok ? "Pushed" : "Error");
        }
        async function doWl(act) {
            const id = document.getElementById('wl_id').value;
            await fetch('/update-whitelist', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({id, action:act})});
            document.getElementById('wl_stat').innerText = "Updated " + id;
        }
        async function updateData() {
            const res = await fetch('/get-games');
            const data = await res.json();
            document.getElementById('g_list').innerHTML = Object.keys(data).map(k => `<div>${data[k].name} - ${data[k].players} Players</div>`).join('');
        }
        window.onload = () => { startClock(); setInterval(updateData, 5000); };
    </script>
</body>
</html>
