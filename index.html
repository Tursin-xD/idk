<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus  | Admin Suite</title>
    <style>
        :root {
            --apple-blue: #0071e3;
            --apple-green: #30d158;
            --apple-red: #ff3b30;
            --glass-bg: rgba(28, 28, 30, 0.85);
            --border-color: rgba(255, 255, 255, 0.15);
        }

        body { 
            margin: 0; background: #000; color: #fff; 
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            overflow: hidden; height: 100vh;
            background: url('https://www.apple.com/v/home/bl/images/overview/hero/hero_iphone15pro__de9bc4v8h26u_large.jpg') no-repeat center center fixed;
            background-size: cover;
        }

        .app-header {
            position: fixed; top: 0; left: 0; width: 100%; height: 50px;
            background: rgba(0,0,0,0.8); backdrop-filter: blur(20px);
            border-bottom: 1px solid #333; display: flex; align-items: center;
            justify-content: space-between; padding: 0 30px; box-sizing: border-box; z-index: 9999;
        }

        .nav-tabs { display: flex; gap: 10px; }
        .nav-tab {
            background: none; border: none; color: #86868b; font-size: 13px;
            cursor: pointer; padding: 6px 12px; border-radius: 6px; transition: 0.3s;
        }
        .nav-tab.active { background: rgba(255,255,255,0.15); color: #fff; font-weight: 600; }

        .apple-container {
            display: flex; align-items: center; justify-content: center;
            height: 100vh; width: 100vw; position: absolute; top: 0; left: 0;
        }

        .glass-panel {
            background: var(--glass-bg); backdrop-filter: blur(30px);
            border-radius: 24px; border: 1px solid var(--border-color);
            width: 90%; max-width: 650px; padding: 40px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5); z-index: 100;
        }

        h1 { font-size: 28px; margin: 0 0 10px 0; letter-spacing: -0.5px; }
        .subtitle { color: #86868b; margin-bottom: 25px; font-size: 14px; }

        input, textarea {
            width: 100%; border-radius: 12px; border: 1px solid #424245;
            background: rgba(0,0,0,0.4); color: #fff; padding: 15px;
            margin-bottom: 15px; outline: none; font-family: monospace; box-sizing: border-box;
        }

        .apple-btn {
            background: var(--apple-blue); color: #fff; border: none;
            border-radius: 12px; padding: 14px; font-size: 15px; font-weight: 600;
            cursor: pointer; width: 100%; transition: 0.2s;
        }
        .apple-btn:hover { opacity: 0.9; }

        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .game-list { background: rgba(0,0,0,0.2); border-radius: 12px; padding: 10px; border: 1px solid var(--border-color); }
        .game-item { padding: 10px; border-bottom: 1px solid #333; display: flex; justify-content: space-between; font-size: 13px; }
        .status-dot { width: 8px; height: 8px; background: var(--apple-green); border-radius: 50%; display: inline-block; margin-right: 8px; }
    </style>
</head>
<body>

    <header class="app-header">
        <div style="font-weight:600;"> Nexus Suite</div>
        <nav class="nav-tabs">
            <button class="nav-tab active" onclick="showTab('executor')">Executor</button>
            <button class="nav-tab" onclick="showTab('games')">Games</button>
            <button class="nav-tab" onclick="showTab('admin')">Admin</button>
        </nav>
        <div id="clock" style="font-size:12px; color:#86868b; font-family:monospace;">00:00:00</div>
    </header>

    <div class="apple-container">
        <div class="glass-panel">
            <div id="executor" class="tab-content active">
                <h1>Executor</h1>
                <p class="subtitle">Deploy vLua Payload to active nodes.</p>
                <input type="password" id="pass_field" placeholder="Admin Password">
                <textarea id="lua_field" placeholder="-- Enter code..."></textarea>
                <button class="apple-btn" onclick="sendPush()">Push to Server</button>
            </div>

            <div id="games" class="tab-content">
                <h1>Active Nodes</h1>
                <p class="subtitle">Live heartbeat monitor.</p>
                <div id="game_list" class="game-list">
                    <div style="color:#666; text-align:center;">No games connected.</div>
                </div>
            </div>

            <div id="admin" class="tab-content">
                <h1>System Admin</h1>
                <p class="subtitle">Server management and logs.</p>
                <button class="apple-btn" style="background:var(--apple-red)" onclick="alert('Shutdown sequence not armed.')">Emergency Stop</button>
            </div>
        </div>
    </div>

    <script>
        // 1. Clock Logic (Always ticks)
        function startClock() {
            setInterval(() => {
                const now = new Date();
                document.getElementById('clock').innerText = now.toLocaleTimeString();
            }, 1000);
        }

        // 2. Tab Logic
        function showTab(id) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-tab').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            event.currentTarget.classList.add('active');
        }

        // 3. API Logic
        async function sendPush() {
            const code = document.getElementById('lua_field').value;
            const password = document.getElementById('pass_field').value;
            
            try {
                const res = await fetch('/push-lua', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ lua: code, password: password })
                });
                if (res.ok) alert("✓ Success"); else alert("✕ Denied");
            } catch (e) { alert("Server Offline"); }
        }

        async function updateGames() {
            try {
                const res = await fetch('/get-games');
                const games = await res.json();
                const list = document.getElementById('game_list');
                const keys = Object.keys(games);
                
                if (keys.length === 0) return;
                
                list.innerHTML = keys.map(id => `
                    <div class="game-item">
                        <span><span class="status-dot"></span>${games[id].name}</span>
                        <span style="color:#86868b">${games[id].players} Players</span>
                    </div>
                `).join('');
            } catch (e) { console.log("Update failed"); }
        }

        // 4. Initialization
        window.onload = () => {
            startClock();
            setInterval(updateGames, 5000);
            console.log(" Nexus UI Initialized");
        };
    </script>
</body>
    </html>
